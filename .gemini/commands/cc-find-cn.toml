description = "搜索课程仓库中的文本内容。查找教材、讲义、笔记、作业、邮件、电话记录等。自动列表文件并按文件名、后缀、内容逐层搜索。用于当用户需要找某类信息时。"

# NOTE: Claude positional/named arguments collapsed to {{args}} during migration.
prompt = """
# 课程内容搜索系统

智能搜索课程仓库中的所有文本内容。支持两种模式：
- **带参数**：用户直接描述，系统立即搜索
- **不带参数**：系统询问想找什么，给出选项，或让用户自由输入

## 核心能力

### 文件发现逻辑

搜索流程：**列表 → 文件名筛 → 后缀筛 → 内容搜**

1. **列表所有文件**：使用 find/ls 列出目标目录的所有文件（不用担心太多，用户保证)
2. **用文件名筛**：先看文件名中是否包含用户的关键词
3. **按后缀分类**：理解 70%-30% 原则
   - **70% 文本内容**（教材、讲义、作业）：`.md`, `.txt`, `.pdf`, `.docx`, `.pptx`
   - **30% 数据/代码**（代码、数据、邮件、电话记录）：`.py`, `.c`, `.cpp`, `.js`, `.json`, `.csv`, `.log`, `.eml`, `.txt` 等
4. **搜索内容**：grep/rg 在相关文件中搜索关键词

### PDF 处理规则

**不直接读 PDF 文本内容**。相反，告诉用户：
- 要提取文本：使用 `/cc-extract-to-md` 将 PDF 转为 Markdown
- 要翻译内容：使用 `/cc-translate-to-${lang}` 翻译为其他语言

## 执行模式

### 模式 1：带参数（用户指定搜索内容）

**用户输入**：`/cc-find-cn 第3周的讲义` 或 `/cc-find-cn 哈希表实现代码`

**执行步骤**：
1. 理解用户查询内容（是材料、代码、邮件等）
2. 读取 INDEX.md 理解目录结构和分类
3. 根据查询类型决定搜索范围：
   - 查材料/讲义 → 优先搜 references/
   - 查代码/数据 → 优先搜 assignments/ 或 references/
   - 查笔记 → 搜 notes/
   - 查邮件/通话记录 → 搜 communication/
   - 其他 → 全局搜索
4. 在决定的目录中：
   - 列出所有文件
   - 按文件名匹配度排序
   - 显示前 10-15 个相关文件（带文件类型标记）
5. 如果有具体内容相关性，用 grep 搜索并展示片段

### 模式 2：不带参数（系统询问用户）

**用户输入**：`/cc-find-cn`

**执行步骤**：

#### 第一步：询问搜索类型

使用 AskUserQuestion 询问用户想找什么，给出 4 个选项 + Other：

```
你想找什么类型的信息？

□ 📚 教材、讲义、参考资料
□ 📝 作业、项目、练习题
□ 💻 代码示例、程序实现
□ 📧 邮件、电话记录、通知
□ Other: 自己输入描述
```

#### 第二步：询问搜索范围

根据用户选择，询问是要在特定目录还是全局搜索：

```
你想在哪里搜索？

□ 指定目录（快速）
□ 全局搜索（完整）
□ Other: 我想在 [目录名] 里搜
```

#### 第三步：询问搜索关键词

```
现在告诉我你要找什么。
可以用：
  • 具体名字：如 "哈希表"
  • 时间：如 "第3周"
  • 主题：如 "二叉搜索树"
  • 文件名片段：如 "assignment3"
```

#### 第四步：执行搜索

用户输入关键词后，按"模式 1"的第 4-5 步执行搜索。

## 搜索结果展示

### 格式

```
================================================================================
        🔍 搜索结果: [关键词] 在 [目录]
================================================================================

📂 相关文件 (共 N 个):

[1] 📄 references/lectures/week-03-hashing.md
    └─ 匹配：文件名包含 "hashing"

[2] 📘 references/readings/chapter-7-hash-tables.pdf
    └─ 匹配：文件名包含 "hash"
    └─ 💡 提示：PDF 文件，使用 /cc-extract-to-md 提取文本

[3] 💻 assignments/assignment-3-hashtable-impl.c
    └─ 匹配：文件名、内容都包含相关关键词
    └─ 片段：「...implement a hash table with...」

[4] 📝 notes/2026-03-05-hash-table-notes.md
    └─ 匹配：内容包含 "hash table"
    └─ 片段：「哈希表是一种快速查找的数据结构...」

================================================================================

下一步？
  • 输入数字 1-4 查看详细内容
  • 输入新的搜索词继续搜索
  • 输入 /cc-find-back 返回上层菜单
  • 直接问我想了解的东西（如 "告诉我这个哈希表的实现原理"）
```

### 文件类型标记

- `📄` = .md, .txt（文本文档）
- `📘` = .pdf（PDF，需要 /cc-extract-to-md）
- `📊` = .pptx, .docx（演示/文档）
- `💻` = .py, .c, .cpp, .js（代码）
- `📧` = .eml, .log（邮件/日志）
- `📝` = 笔记相关文件

## 智能路由（读取 INDEX.md）

skill 会自动：
1. 读取 INDEX.md 理解目录结构
2. 解析各目录的用途：
   - `references/` → 课程材料
   - `assignments/` → 作业
   - `notes/` → 个人笔记
   - `communication/` → 邮件、电话
   - `study/` → 学习实例
   - `exams/` → 考试准备
   - `team/` → 团队项目
3. 根据用户查询智能推荐搜索范围

## 特殊情况处理

### 用户选了 PDF 文件

展示：
```
📘 references/textbooks/DS-textbook.pdf

这是一个 PDF 文件。要读取其中的内容，请：

1️⃣  提取为 Markdown：
   /cc-extract-to-md references/textbooks/DS-textbook.pdf

2️⃣  翻译成其他语言：
   /cc-translate-to-cn references/textbooks/DS-textbook.pdf

3️⃣  询问我 PDF 内容的问题：
   我可以帮你分析或讨论这个文件，只需告诉我你想了解什么
```

### 多个相似结果

展示前 10-15 个，然后给出筛选选项：
```
找到 45 个相关文件，这里展示前 15 个。

想要：
  • 看更多结果
  • 缩小范围（输入更具体的关键词）
  • 只看某一类文件（代码/笔记/PDF 等）
```

## 参数处理

{{args}}

## 提示和最佳实践

1. **文件名优先**：同样的关键词，文件名匹配通常比内容匹配更相关
2. **支持模糊匹配**："第3周" "week3" "week-3" 都应该匹配到相同的文件
3. **大小写不敏感**：搜索时忽略大小写
4. **保留原始路径**：显示结果时保留完整相对路径，方便复制
5. **鼓励后续提问**：搜索后，用户可以直接问 "告诉我这个文件的内容" 或 "解释一下..."

---

## 内部工具和方法

使用以下工具实现搜索：
- **Glob** - 快速文件模式匹配
- **Grep** - 内容搜索
- **Read** - 读取 INDEX.md 和文件片段
- **AskUserQuestion** - 两种模式的交互询问
"""
